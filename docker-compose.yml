services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile.dev 
    volumes:
      - .:/app    
      - /app/node_modules                      # ← mount current folder to /app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@ecom-db:5432/postgres
      - JWT_SECRET=fdcb2adcf27af609b5aaf4331e946a53ef08e526bd7d45890c41d565ae680428
    depends_on:
      - ecom-db

  ecom-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata1:/var/lib/postgresql/data

volumes:
  pgdata1:

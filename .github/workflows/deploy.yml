name: Deploy to EC2

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: jyotsna/ecommerce
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 via SSM (all private-ec2 tagged instances)
        run: |
          # Discover all EC2 instances with tag type=private-ec2
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:type,Values=private-ec2" "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --region ${{ secrets.AWS_REGION }} \
            --output text | tr '\t' ' ')

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No running EC2 instances found with tag type=private-ec2"
            exit 1
          fi

          echo "Target instances: $INSTANCE_IDS"

          # Send SSM command to all instances using tag-based targeting
          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=tag:type,Values=private-ec2" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ecommerce-web" \
            --parameters '{"commands":[
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REGISTRY }}/jyotsna/ecommerce:latest",
              "docker ps -q --filter publish=3000 | xargs -r docker rm -f || true",
              "docker rm -f ecommerce-web || true",
              "docker run -d --name ecommerce-web -p 3000:3000 -e DATABASE_URL=${{ secrets.DATABASE_URL }} -e JWT_SECRET=${{ secrets.JWT_SECRET }} ${{ secrets.ECR_REGISTRY }}/jyotsna/ecommerce:latest"
            ]}' \
            --timeout-seconds 300 \
            --region ${{ secrets.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Poll until all invocations complete
          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "Waiting for deployment on $INSTANCE_ID..."
            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region ${{ secrets.AWS_REGION }} || true

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region ${{ secrets.AWS_REGION }} \
              --query "Status" \
              --output text)

            echo "Instance $INSTANCE_ID deployment status: $STATUS"
            if [ "$STATUS" != "Success" ]; then
              echo "Deployment failed on $INSTANCE_ID!"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "One or more deployments failed!"
            exit 1
          fi

          echo "All instances deployed successfully."

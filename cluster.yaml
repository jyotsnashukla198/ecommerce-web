apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ecommerce-cluster
  region: ap-south-1

managedNodeGroups:
  - name: ecommerce-nodes
    instanceType: t3.medium
    minSize: 1
    maxSize: 2
    desiredCapacity: 2
    iam:
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly  # pull from ECR
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
vpc:
  id: "vpc-01683f8cbb3c07d70"        # your VPC ID
  subnets:
    public:
      ap-south-1a:
        id: "subnet-050a1e410a8f8d28e"
      ap-south-1b:
        id: "subnet-00cccbe285bd18a62"
    private:
      ap-south-1c:
        id: "subnet-0f167170f498aae17"   # private subnet in AZ 1c
      ap-south-1b:
        id: "subnet-0d0f91bc689296b63"   # private subnet in AZ 1b

